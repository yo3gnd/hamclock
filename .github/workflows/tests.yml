name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: make test
    runs-on: ubuntu-latest
    container: alpine:3.23

    steps:
      - name: Install dependencies
        run: apk add --no-cache git make python3 bash perl

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run tests
        working-directory: ESPHamClock
        run: make test
